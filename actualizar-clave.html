<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva Contraseña - TuBingo Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f2f6; color: #2d3436; }
    .caja { background: white; padding: 35px 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; box-sizing: border-box; }
    .caja h1 { margin: 0 0 5px; font-size: 1.3rem; color: #2c3e50; text-align: center; }
    .caja p.subt { margin: 0 0 20px; font-size: 0.85rem; color: #7f8c8d; text-align: center; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 13px; margin-top: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #mensaje { font-size: 0.85rem; text-align: center; margin-top: 12px; min-height: 1em; }
    .error { color: #d63031; }
    .exito { color: #27ae60; }
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="conexion.js"></script>
</head>
<body>
  <div class="caja">
    <h1>Crear Nueva Contraseña</h1>
    <p class="subt" id="textoAyuda">Escribe tu nueva contraseña para continuar</p>
    <input type="password" id="claveNueva" placeholder="Nueva contraseña (mínimo 6 caracteres)">
    <input type="password" id="claveNuevaConfirmar" placeholder="Confirma tu nueva contraseña">
    <button id="btnGuardar" onclick="guardarNuevaClave()">Guardar Contraseña</button>
    <div id="mensaje"></div>
  </div>

  <script>
    // Cuando la persona llega desde el enlace del correo, Supabase crea
    // automáticamente una sesión temporal de recuperación.
    window.addEventListener('load', async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) {
        document.getElementById("textoAyuda").innerText = "Este enlace ya no es válido o ya venció.";
        document.getElementById("mensaje").innerHTML = 'Solicita uno nuevo desde <a href="login.html">la pantalla de inicio de sesión</a>.';
        document.getElementById("mensaje").className = "error";
        document.getElementById("btnGuardar").disabled = true;
      }
    });

    async function guardarNuevaClave() {
      const clave1 = document.getElementById("claveNueva").value;
      const clave2 = document.getElementById("claveNuevaConfirmar").value;
      const msg = document.getElementById("mensaje");
      const btn = document.getElementById("btnGuardar");
      msg.className = "";
      msg.innerText = "";

      if (!clave1 || clave1.length < 6) {
        msg.className = "error";
        msg.innerText = "La contraseña debe tener al menos 6 caracteres.";
        return;
      }
      if (clave1 !== clave2) {
        msg.className = "error";
        msg.innerText = "Las contraseñas no coinciden.";
        return;
      }

      btn.disabled = true;
      btn.innerText = "Guardando...";

      const { error } = await _supabase.auth.updateUser({ password: clave1 });

      if (error) {
        msg.className = "error";
        msg.innerText = "No se pudo guardar: " + error.message;
        btn.disabled = false;
        btn.innerText = "Guardar Contraseña";
        return;
      }

      msg.className = "exito";
      msg.innerText = "¡Contraseña actualizada! Redirigiendo...";

      const { data: { session } } = await _supabase.auth.getSession();
      const { data: perfil } = await _supabase.from('perfiles').select('rol').eq('id', session.user.id).single();

      setTimeout(() => {
        window.location.href = (perfil && perfil.rol === 'admin') ? "admin.html" : "registro.html";
      }, 1200);
    }
  </script>
</body>
</html>
