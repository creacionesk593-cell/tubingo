<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Cartones - TuBingo Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: #333; }
    
    /* Cabecera dinámica controlada por marca */
    header { background: #4CAF50; color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .header-logo { max-height: 80px; max-width: 180px; object-fit: contain; display: none; } 
    header h2 { margin: 0; }

    main { padding: 20px; max-width: 600px; margin: auto; }
    
    /* Lector QR con fondo claro y transición */
    #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 8px; overflow: hidden; background: #f0f0f0; border: 2px dashed #4CAF50; transition: border-color 0.3s ease; }
    #reader video { width: 100% !important; object-fit: cover; }
    
    .formulario { margin-top: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .formulario h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #edf2f7; padding-bottom: 8px; }
    .formulario input { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    .formulario input:focus { outline: none; }
    
    .banner-alerta { background: #ff7675; color: white; padding: 15px; text-align: center; font-weight: bold; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 18px; }
    
    /* BANNER DE CUENTA REGRESIVA OPTIMIZADO (Súper visible) */
    .banner-cuenta-regresiva { 
      background: #ff9f43; 
      color: white; 
      padding: 18px 15px; 
      text-align: center; 
      font-weight: 800; 
      border-radius: 8px; 
      margin-bottom: 20px; 
      display: none; 
      font-size: 22px; 
      box-shadow: 0 4px 10px rgba(255, 159, 67, 0.3);
      animation: parpadeo 1.5s infinite; 
    }
    .banner-cuenta-regresiva span {
      font-size: 28px; 
      display: inline-block;
      margin-left: 5px;
      background: rgba(0, 0, 0, 0.15);
      padding: 2px 10px;
      border-radius: 6px;
      letter-spacing: 1px;
    }
    @keyframes parpadeo { 
      0% { opacity: 0.9; transform: scale(1); } 
      50% { opacity: 1; background: #ee5253; transform: scale(1.01); } 
      100% { opacity: 0.9; transform: scale(1); } 
    }

    /* Botones y tablas configurables */
    button { width: 100%; padding: 14px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s, filter 0.2s; margin-top: 10px; }
    button:hover { filter: brightness(0.9); }
    button:disabled { background: #cccccc; cursor: not-allowed; }

    .table-container { width: 100%; overflow-x: auto; margin-top: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
    th, td { border-bottom: 1px solid #ddd; padding: 12px 10px; text-align: center; }
    th { background: #4CAF50; color: white; }
    label { display: flex; align-items: center; margin: 10px 0; font-weight: 500; cursor: pointer; }
    label input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; }
    
    #resultadoQR { margin-top: 15px; padding: 12px; background: #eef2f7; border-radius: 6px; text-align: center; font-size: 0.95rem; font-weight: bold; transition: all 0.3s ease; border: 1px solid transparent; }
    .scan-exito { background: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; transform: scale(1.02); }
    
    #contador { margin-top: 15px; font-size: 24px; color: #27ae60; font-weight: 800; text-align: center; background: #e8f5e9; padding: 10px; border-radius: 6px; border: 1px dashed #4CAF50; letter-spacing: 0.5px; transition: all 0.3s ease; }
    
    .loading { opacity: 0.5; pointer-events: none; position: relative; }
    
    .btn-eliminar { background: #ff7675; margin: 0; padding: 6px 12px; font-size: 13px; width: auto; border-radius: 4px; color: white; border: none; cursor: pointer; }
    .btn-eliminar:hover { background: #e84393; }
    
    .alerta-duplicado { color: #d63031; font-weight: bold; font-size: 12px; display: block; margin-top: 4px; }
    .fila-duplicada { background-color: #ffeaa7; } 
  </style>
  
  <style id="estilosDinamicosMarca"></style>
  
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="conexion.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <header id="headerRegistro" style="position:relative;">
    <img id="logoDinamico" class="header-logo" src="" alt="Bingo Logo">
    <h2 id="tituloHeader">Registro de Cartones - TuBingo Pro</h2>
    <button onclick="cerrarSesion()" style="position:absolute; right:15px; top:15px; width:auto; padding:8px 14px; font-size:13px; background:rgba(255,255,255,0.25);">Salir</button>
  </header>
  
  <main id="contenidoPrincipal">
    <div id="bannerCierre" class="banner-alerta">⚠️ EL REGISTRO DE CARTONES YA ESTÁ CERRADO</div>
    <div id="bannerCuentaRegresiva" class="banner-cuenta-regresiva">⏳ ¡APÚRATE! EL REGISTRO CIERRA EN:<span id="tiempoRestante">00:00</span></div>

    <div class="formulario" style="margin-top:0;">
      <h3>Escanear Código QR</h3>
      <label><input type="checkbox" id="leerTodos" checked> Permitir múltiples cartones</label>
      <div id="reader"></div>
      <div id="resultadoQR">Esperando acción o escaneo...</div>
      <div id="contador">Cartones en lista: 0</div>
    </div>

    <div class="formulario">
      <h3>Datos personales</h3>
      <input type="text" id="nombre" placeholder="Nombre Completo" required>
      <input type="text" id="celular" placeholder="Número de Celular" required>
      <input type="text" id="correo" placeholder="Correo Electrónico" required>
      <input type="text" id="ciudad" placeholder="Ciudad (Ej: Guayaquil)" required>
      <input type="text" id="direccion" placeholder="Dirección Exacta (Ej: Isla Trinitaria solar 45)" required>
      <input type="text" id="vendedor" placeholder="Nombre del Vendedor (Opcional)">

      <button id="btnRegistrar" onclick="enviarAlBackend()">Registrar Cartones en el Sistema</button>
    </div>

    <div class="table-container">
      <table id="tabla">
        <thead>
          <tr>
            <th class="dinamico-th">#</th>
            <th class="dinamico-th">Serie (Cartón)</th>
            <th class="dinamico-th">Ubicación</th>
            <th class="dinamico-th">Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" style="color:#999; padding: 15px;">Ningún cartón escaneado aún</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    let CONFIG_SISTEMA = { limite_cartones: 5, fecha_cierre: null, caracteres_qr: 6 };
    let listaQR = [];
    let cartonesDuplicados = []; 
    let ipPublica = "", geoLatitud = "", geoLongitud = "";
    let intervaloRegresivo = null;
    let scanner = null;

    function emitirSonidoExito() {
      try {
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let oscillator = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.12); 
      } catch (e) { console.error(e); }
    }

    window.addEventListener('load', async () => {
      // Verifica que haya sesión iniciada y que el rol sea "usuario".
      // Si es admin, lo manda a admin.html; si no hay sesión, a login.html.
      const acceso = await requerirSesion('usuario');
      if (!acceso) return;

      fetch('https://api.ipify.org?format=json').then(res => res.json()).then(d => ipPublica = d.ip).catch(e => {});
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => { geoLatitud = p.coords.latitude; geoLongitud = p.coords.longitude; }, e => {});
      }

      setTimeout(async () => {
        try {
          const { data: configGeneral } = await _supabase.from('configuracion').select('*').eq('id', 1).single();
          if (configGeneral) {
            CONFIG_SISTEMA.limite_cartones = configGeneral.limite_cartones;
            CONFIG_SISTEMA.caracteres_qr = configGeneral.caracteres_qr;
            CONFIG_SISTEMA.fecha_cierre = new Date(configGeneral.fecha_cierre);
            iniciarMonitoreoTiempo();
          }

          // MEJORA OWASP: Ahora solo descargamos los valores que la política RLS permite explícitamente (diseño)
          const { data: diseno } = await _supabase.from('configuracion_sistema').select('clave, valor');
          if (diseno) {
            let logoUrl = diseno.find(x => x.clave === 'diseno_logo_url')?.valor;
            let colorPrimario = diseno.find(x => x.clave === 'diseno_color_principal')?.valor;

            if (logoUrl && logoUrl.trim() !== "") {
              let imgEl = document.getElementById("logoDinamico");
              imgEl.src = logoUrl;
              imgEl.style.display = "block";
            }
            
            if (colorPrimario) {
              document.getElementById("btnRegistrar").style.background = colorPrimario;
              document.getElementById("headerRegistro").style.background = colorPrimario;
              document.querySelectorAll(".dinamico-th").forEach(th => th.style.background = colorPrimario);
              
              document.getElementById("reader").style.borderColor = colorPrimario;
              document.getElementById("contador").style.color = colorPrimario;
              document.getElementById("contador").style.borderColor = colorPrimario;
              
              document.querySelectorAll(".formulario input").forEach(input => {
                input.addEventListener('focus', () => input.style.borderColor = colorPrimario);
                input.addEventListener('blur', () => input.style.borderColor = '#ccc');
              });

              document.getElementById("estilosDinamicosMarca").innerHTML = `
                #reader button {
                  background-color: ${colorPrimario} !important;
                  color: white !important;
                  border: none !important;
                  padding: 10px 20px !important;
                  font-weight: bold !important;
                  border-radius: 5px !important;
                  cursor: pointer !important;
                  transition: filter 0.2s !important;
                }
                #reader button:hover {
                  filter: brightness(0.85) !important;
                }
                #reader a {
                  color: ${colorPrimario} !important;
                  font-weight: bold !important;
                }
              `;
            }
          }
        } catch (err) { console.error("Error cargando configuración remota:", err); }
      }, 500);
    });

    function iniciarMonitoreoTiempo() {
      if (!CONFIG_SISTEMA.fecha_cierre) return;
      if (intervaloRegresivo) clearInterval(intervaloRegresivo);

      intervaloRegresivo = setInterval(() => {
        let ahoraMilisegundos = new Date().getTime();
        let cierreMilisegundos = CONFIG_SISTEMA.fecha_cierre.getTime();
        let diferenciaMilisegundos = cierreMilisegundos - ahoraMilisegundos;

        if (diferenciaMilisegundos <= 0) {
          clearInterval(intervaloRegresivo);
          document.getElementById("bannerCuentaRegresiva").style.display = "none";
          bloquearSistemaPorFecha();
          return;
        }

        let quinceMinutosEnMs = 15 * 60 * 1000;
        if (diferenciaMilisegundos <= quinceMinutosEnMs) {
          let minutosRestantes = Math.floor(diferenciaMilisegundos / (1000 * 60));
          let segundosRestantes = Math.floor((diferenciaMilisegundos % (1000 * 60)) / 1000);

          let minutosTxt = minutosRestantes < 10 ? "0" + minutosRestantes : minutosRestantes;
          let segundosTxt = segundosRestantes < 10 ? "0" + segundosRestantes : segundosRestantes;

          let bannerRegresivo = document.getElementById("bannerCuentaRegresiva");
          bannerRegresivo.style.display = "block";
          document.getElementById("tiempoRestante").innerText = `${minutosTxt}:${segundosTxt}`;
        } else {
          document.getElementById("bannerCuentaRegresiva").style.display = "none";
        }
      }, 1000);
    }

    function bloquearSistemaPorFecha() {
      document.getElementById("bannerCierre").style.display = "block";
      document.getElementById("btnRegistrar").disabled = true;
      document.getElementById("btnRegistrar").innerText = "Registro Cerrado por Fecha Límite";
      document.getElementById("contenidoPrincipal").classList.add("loading");
      if (scanner) scanner.clear();
    }

    function actualizarContador() {
      document.getElementById("contador").innerText = "Cartones en lista: " + listaQR.length;
    }

    function procesarFormato(texto) {
      let formato = CONFIG_SISTEMA.caracteres_qr;
      let pos = texto.indexOf("@");
      if (pos !== -1 && texto.length > pos + formato) {
        return texto.substring(pos+1, pos+1+formato);
      }
      return texto;
    }

    function onScanSuccess(decodedText) {
      if (CONFIG_SISTEMA.fecha_cierre && (new Date().getTime() >= CONFIG_SISTEMA.fecha_cierre.getTime())) {
        bloquearSistemaPorFecha();
        return;
      }

      let procesado = procesarFormato(decodedText);
      let contenedorResultado = document.getElementById("resultadoQR");
      
      if (!listaQR.includes(procesado)) {
        emitirSonidoExito();
        contenedorResultado.innerText = "¡Leído con éxito!: " + procesado;
        contenedorResultado.classList.add("scan-exito");
        
        setTimeout(() => { contenedorResultado.classList.remove("scan-exito"); }, 1000);

        if (document.getElementById("leerTodos").checked) {
          listaQR.push(procesado);
        } else {
          listaQR = [procesado];
        }
        actualizarTabla();
      } else {
        contenedorResultado.innerText = "⚠️ El código " + procesado + " ya lo tienes en tu lista temporal.";
      }
    }

    scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250, rememberLastUsedCamera: true });
    scanner.render(onScanSuccess, (err) => {});

    function actualizarTabla() {
      let tbody = document.querySelector("#tabla tbody");
      tbody.innerHTML = "";
      let ciudadInput = document.getElementById("ciudad").value.trim() || "---";
      let direccionInput = document.getElementById("direccion").value.trim() || "---";

      if(listaQR.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#999; padding: 15px;">Ningún cartón escaneado aún</td></tr>`;
        actualizarContador();
        return;
      }

      listaQR.forEach((qr, index) => {
        let fila = document.createElement("tr");
        let esDuplicado = cartonesDuplicados.includes(qr);
        if(esDuplicado) fila.classList.add("fila-duplicada");

        fila.innerHTML = `
          <td>${index + 1}</td>
          <td>
            <strong>${qr}</strong>
            ${esDuplicado ? '<span class="alerta-duplicado">⚠️ Ya registrado por otro jugador</span>' : ''}
          </td>
          <td>${ciudadInput} - ${direccionInput}</td>
          <td>
            <button class="btn-eliminar" onclick="eliminarCarton(${index})">Eliminar</button>
          </td>
        `;
        tbody.appendChild(fila);
      });
      actualizarContador();
    }

    function eliminarCarton(index) {
      let qrRemovido = listaQR[index];
      listaQR.splice(index, 1);
      cartonesDuplicados = cartonesDuplicados.filter(item => item !== qrRemovido);
      actualizarTabla();
    }

    document.getElementById("ciudad").addEventListener("input", actualizarTabla);
    document.getElementById("direccion").addEventListener("input", actualizarTabla);

    async function enviarAlBackend() {
      if (CONFIG_SISTEMA.fecha_cierre && (new Date().getTime() >= CONFIG_SISTEMA.fecha_cierre.getTime())) {
        bloquearSistemaPorFecha();
        alert("El tiempo de registro de cartones ha expirado.");
        return;
      }

      let nombre = document.getElementById("nombre").value.trim();
      let celular = document.getElementById("celular").value.trim();
      let correo = document.getElementById("correo").value.trim();
      let ciudad = document.getElementById("ciudad").value.trim();
      let direccion = document.getElementById("direccion").value.trim();
      let vendedor = document.getElementById("vendedor").value.trim() || "WEB";

      if (!nombre || !celular || !correo || !ciudad || !direccion) {
        alert("Por favor complete todos los campos requeridos.");
        return;
      }

      if (listaQR.length === 0) {
        alert("Escanee al menos un cartón QR.");
        return;
      }

      let mainEl = document.getElementById("contenidoPrincipal");
      let btn = document.getElementById("btnRegistrar");
      mainEl.classList.add("loading");
      btn.innerText = "Verificando disponibilidad...";

      cartonesDuplicados = [];

      try {
        const { data: existentes, error: errConteo } = await _supabase
          .from('registros_bingo')
          .select('id')
          .eq('telefono', celular);

        if (errConteo) throw errConteo;

        if (existentes.length + listaQR.length > CONFIG_SISTEMA.limite_cartones) {
          alert(`¡Cupo Excedido! Límite actual de máximo ${CONFIG_SISTEMA.limite_cartones}.`);
          mainEl.classList.remove("loading");
          btn.innerText = "Registrar Cartones en el Sistema";
          return;
        }

        const { data: yaRegistrados, error: errValidacion } = await _supabase
          .from('registros_bingo')
          .select('carton')
          .in('carton', listaQR);

        if (errValidacion) throw errValidacion;

        if (yaRegistrados && yaRegistrados.length > 0) {
          cartonesDuplicados = yaRegistrados.map(row => row.carton);
          actualizarTabla();
          alert("¡Atención! Se detectaron cartones duplicados en uso por otra persona.");
          mainEl.classList.remove("loading");
          btn.innerText = "Registrar Cartones en el Sistema";
          return;
        }

        let ubicacionCompleta = `${ciudad} - ${direccion}`;
        let filasAInsertar = listaQR.map(serie => ({
          carton: serie, nombre: nombre, correo: correo, telefono: celular,
          ciudad: ubicacionCompleta, vendedor: vendedor, ip_publica: ipPublica,
          gps_latitud: geoLatitud ? geoLatitud.toString() : "", gps_longitud: geoLongitud ? geoLongitud.toString() : ""
        }));

        const { error: errInsert } = await _supabase.from('registros_bingo').insert(filasAInsertar);
        if (errInsert) throw errInsert;

        alert("¡Todos tus cartones han sido registrados exitosamente!");
        listaQR = [];
        actualizarTabla();
        document.getElementById("nombre").value = "";
        document.getElementById("celular").value = "";
        document.getElementById("correo").value = "";
        document.getElementById("ciudad").value = "";
        document.getElementById("direccion").value = "";
        document.getElementById("vendedor").value = "";

      } catch (err) { alert("Error: " + err.message); } 
      finally { mainEl.classList.remove("loading"); btn.innerText = "Registrar Cartones en el Sistema"; }
    }
  </script>
</body>
</html>
